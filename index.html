<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cosmo">
<meta name="theme-color" content="#6C6CE8">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<title>Cosmo — Ruimteleren</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#6C6CE8;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    touch-action:none; user-select:none; -webkit-user-select:none; }
  #game { display:block; position:absolute; inset:0; }

  .hud { position:absolute; top:max(14px,env(safe-area-inset-top)); pointer-events:none; z-index:10; }
  #pts { right:14px; display:flex; align-items:center; gap:7px;
    background:rgba(30,27,94,.85); color:#fff; font-weight:600; font-size:15px; padding:7px 14px; border-radius:16px; }
  #pts .star { width:15px; height:15px; }
  #topleft { left:14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; max-width:calc(100vw - 28px); z-index:11; }
  #topleft > * { pointer-events:auto; }
  #name { display:flex; align-items:center; gap:8px;
    background:rgba(30,27,94,.85); color:#fff; font-weight:600; font-size:14px; padding:6px 13px; border-radius:16px; cursor:pointer; }
  #name:active { transform:scale(.96); }
  #name .dot { width:16px; height:16px; border-radius:50%; background:#33C9C6; border:1.5px solid #fff; }
  #ubtn { position:relative;
    background:rgba(30,27,94,.85); color:#fff; font-weight:600; font-size:13px; border:none;
    padding:7px 13px; border-radius:14px; cursor:pointer; }
  #ubtn:active{ transform:scale(.96); }
  #ubtn.alert::after { content:''; position:absolute; top:-4px; right:-4px; width:13px; height:13px;
    border-radius:50%; background:#FF6B6B; border:2px solid #6C6CE8; animation:ubtnpulse 1s ease-in-out infinite; }
  @keyframes ubtnpulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.3); } }
  #dimname { left:50%; transform:translateX(-50%); top:14px; opacity:0; transition:opacity .6s;
    background:rgba(30,27,94,.8); color:#fff; font-weight:600; font-size:14px; padding:6px 16px; border-radius:14px; }

  #hint { position:absolute; left:50%; transform:translateX(-50%); bottom:62px;
    background:rgba(255,255,255,.16); color:#fff; font-weight:600; font-size:13px;
    padding:7px 16px; border-radius:14px; pointer-events:none; transition:opacity .6s; z-index:10; }
  #goal { position:absolute; left:50%; transform:translateX(-50%); bottom:max(16px,env(safe-area-inset-bottom)); width:min(86vw,360px);
    background:rgba(30,27,94,.82); border-radius:14px; padding:8px 14px 9px; z-index:10; pointer-events:none; }
  #goaltext { color:#fff; font-weight:600; font-size:12.5px; text-align:center; margin-bottom:6px; }
  #goalbar { height:6px; background:rgba(255,255,255,.2); border-radius:4px; overflow:hidden; }
  #goalfill { height:100%; width:0%; background:#FFD24A; border-radius:4px; transition:width .4s; }

  .overlay { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(20,18,70,.55); padding:18px; z-index:20; }
  .overlay.show { display:flex; }
  .card { width:100%; max-width:440px; background:#6C6CE8; border:4px solid #1E1B5E; border-radius:26px;
    padding:20px 18px 22px; text-align:center; color:#fff; box-shadow:0 10px 40px rgba(20,18,70,.4); max-height:92vh; overflow-y:auto; }
  .mg-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .pill { background:rgba(255,255,255,.18); font-size:13px; font-weight:600; padding:5px 12px; border-radius:12px; }
  .qbox { background:#C2E1F8; color:#1E1B5E; border:3.5px solid #1E1B5E; border-radius:20px;
    padding:18px 10px; font-size:34px; font-weight:700; margin:6px 0 20px; min-height:78px; display:flex; align-items:center; justify-content:center; }
  .qbox.seq { font-size:24px; letter-spacing:1px; }
  .qbox.draw { padding:12px; min-height:0; }
  .qbox.lees { flex-direction:column; gap:10px; font-size:17px; line-height:1.4; padding:16px 16px; }
  .lees-text { font-weight:600; }
  .lees-q { font-weight:800; }
  .q-prompt { font-size:18px; font-weight:700; color:#fff; margin:2px 0 10px; }
  #qcanvas { display:block; margin:0 auto; max-width:100%; height:auto; }
  .answers { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .answers.wide { flex-direction:column; gap:10px; }
  .ans { flex:1 1 0; min-width:78px; max-width:120px; aspect-ratio:1/1; border:3.5px solid #1E1B5E; border-radius:50%;
    background:#FFE7A0; color:#1E1B5E; font-size:26px; font-weight:700; cursor:pointer; transition:transform .1s; }
  .ans.wide { flex:1 1 100%; width:100%; max-width:none; aspect-ratio:auto; border-radius:16px; min-height:0; padding:14px 14px; font-size:19px; }
  .ans:nth-child(2){ background:#C8E6A0; } .ans:nth-child(3){ background:#F4B9CE; }
  .ans:active{ transform:scale(.94); } .ans.good{ background:#7BE0A0 !important; } .ans.bad{ background:#F08A8A !important; } .ans:disabled{ cursor:default; }
  .mg-msg { font-size:22px; font-weight:700; margin:8px 0 16px; }
  .mg-sub { font-size:15px; font-weight:500; opacity:.92; margin-bottom:20px; line-height:1.5; }
  .btn { background:#FFD24A; color:#1E1B5E; border:3.5px solid #1E1B5E; border-radius:16px; font-size:17px; font-weight:700; padding:13px 30px; cursor:pointer; }
  .btn:active{ transform:scale(.97); }
  .btn.ghost { background:transparent; color:#fff; border-color:rgba(255,255,255,.5); font-size:14px; padding:9px 18px; }
  .stars-earned{ font-size:28px; margin:4px 0 12px; line-height:1.3; }

  .tier { display:flex; align-items:center; gap:10px; text-align:left; background:rgba(255,255,255,.1);
    border-radius:14px; padding:11px 13px; margin-bottom:9px; }
  .tier.locked { opacity:.55; }
  .tinfo { flex:1; }
  .tname { font-size:15px; font-weight:700; }
  .tdesc { font-size:12.5px; opacity:.9; margin-top:1px; }
  .badge { font-size:13px; font-weight:700; padding:5px 11px; border-radius:11px; white-space:nowrap; }
  .badge.done { background:#7BE0A0; color:#13502E; } .badge.lock { background:rgba(255,255,255,.2); color:#fff; }
  .swatches { display:flex; gap:8px; flex-wrap:wrap; }
  .sw { width:30px; height:30px; border-radius:50%; border:3px solid #1E1B5E; cursor:pointer; }
  .sw:active{ transform:scale(.9); }
  .sw.sel { box-shadow:0 0 0 3px #FFD24A; }
  /* UFO-garage */
  .ufoprev { display:block; margin:4px auto 14px; width:240px; max-width:82%; height:auto;
    background:rgba(20,18,70,.35); border-radius:18px; }
  .opt { display:flex; align-items:center; gap:11px; text-align:left; background:rgba(255,255,255,.1);
    border-radius:14px; padding:10px 12px; margin-bottom:9px; }
  .opt.locked { opacity:.6; }
  .opt-ic { font-size:22px; width:28px; text-align:center; flex:none; }
  .opt-info { flex:1; min-width:0; }
  .opt-name { font-size:15px; font-weight:700; }
  .opt-req { font-size:12px; opacity:.85; margin-top:1px; }
  .opt-ctrl { flex:none; display:flex; align-items:center; }
  .togglebtn { background:rgba(255,255,255,.18); color:#fff; border:2.5px solid rgba(255,255,255,.4);
    border-radius:12px; font-size:13px; font-weight:700; padding:7px 16px; cursor:pointer; min-width:62px; }
  .togglebtn.on { background:#7BE0A0; color:#13502E; border-color:#1E1B5E; }
  .togglebtn:active { transform:scale(.95); }
  .stylechips { display:flex; gap:6px; flex-wrap:wrap; margin-top:7px; }
  .stylechip { background:rgba(255,255,255,.16); color:#fff; border:2px solid rgba(255,255,255,.35);
    border-radius:10px; font-size:12px; font-weight:700; padding:5px 11px; cursor:pointer; }
  .stylechip.sel { background:#FFD24A; color:#1E1B5E; border-color:#1E1B5E; }
  .stylechip:active { transform:scale(.95); }
  .ufothumbs { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .ufopick { text-align:center; }
  .ufothumbwrap { position:relative; }
  .ufothumb { display:block; width:84px; height:62px; background:rgba(20,18,70,.4); border-radius:14px;
    border:3px solid transparent; cursor:pointer; }
  .ufothumb.sel { border-color:#FFD24A; }
  .ufothumb:active { transform:scale(.95); }
  .ufothumbwrap.locked .ufothumb { opacity:.32; cursor:default; }
  .ufolock { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:800; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.6); pointer-events:none; }
  .ufolabel { font-size:11px; font-weight:700; margin-top:3px; opacity:.9; }
  .lvlrow { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:6px 0 4px; }
  .semrow { display:flex; gap:10px; justify-content:center; margin:6px 0 2px; }
  .semrow .lvlbtn { flex:1; max-width:170px; }
  .lvlbtn { background:rgba(255,255,255,.14); color:#fff; border:2.5px solid rgba(255,255,255,.4);
    border-radius:12px; font-size:14px; font-weight:700; padding:8px 12px; cursor:pointer; min-width:54px; }
  .lvlbtn.sel { background:#FFD24A; color:#1E1B5E; border-color:#1E1B5E; }

  /* speels aanmeldscherm */
  .ob-hi { font-size:30px; margin:2px 0 4px; }
  .ob-sentence { font-size:17px; font-weight:600; opacity:.95; margin:2px 0 6px; }
  .ob-input { width:100%; max-width:300px; font-size:22px; font-weight:700; text-align:center;
    color:#1E1B5E; background:#fff; border:3.5px solid #1E1B5E; border-radius:16px; padding:13px 14px; outline:none;
    user-select:text; -webkit-user-select:text; }
  .ob-input::placeholder { color:#9D99C2; font-weight:600; }
  .ob-input:focus { box-shadow:0 0 0 4px rgba(255,210,74,.6); }
  .grade-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:8px 0 2px; }
  .grade { border:3px solid #1E1B5E; border-radius:18px; padding:11px 6px 9px; cursor:pointer; color:#1E1B5E;
    font-weight:700; transition:transform .12s, box-shadow .12s; position:relative; min-height:64px; }
  .grade:active { transform:scale(.94); }
  .grade .num { font-size:25px; line-height:1; }
  .grade .lbl { font-size:11px; font-weight:700; opacity:.78; margin-top:2px; }
  .grade.sel { box-shadow:0 0 0 4px #FFD24A; transform:translateY(-2px); }
  .grade.sel::after { content:'✓'; position:absolute; top:5px; right:8px; font-size:13px; color:#1E1B5E; }

  /* subtiel aftel-chipje (volgende upgrade) */
  #vakken { right:14px; top:calc(max(14px,env(safe-area-inset-top)) + 40px); display:flex; align-items:center; gap:6px;
    background:rgba(30,27,94,.55); color:#fff; font-weight:600; font-size:12px; padding:5px 10px; border-radius:13px; }
  #vakken .vk-ic { font-size:13px; }
  #vakken .vk-n { background:rgba(255,255,255,.22); color:#fff; padding:1px 7px; border-radius:8px; font-size:11.5px; font-weight:800; }
  #vakken .vk-tx { opacity:.9; }
  #nextup { right:14px; top:calc(max(14px,env(safe-area-inset-top)) + 72px); display:flex; align-items:center; gap:6px;
    background:rgba(30,27,94,.55); color:#fff; font-weight:600; font-size:12px; padding:5px 10px; border-radius:13px; }
  #nextup .nu-ic { font-size:14px; }
  #nextup .nu-tx { opacity:.9; }
  #nextup .nu-need { background:rgba(255,210,74,.22); color:#FFE7A0; padding:1px 7px; border-radius:8px; font-size:11px; font-weight:700; }
  #arcadenext { right:14px; top:calc(max(14px,env(safe-area-inset-top)) + 104px); display:flex; align-items:center; gap:6px;
    background:rgba(30,27,94,.55); color:#fff; font-weight:600; font-size:12px; padding:5px 10px; border-radius:13px; }
  #arcadenext .nu-ic { font-size:14px; }
  #arcadenext .nu-tx { opacity:.9; }
  #arcadenext .nu-need { background:rgba(106,209,168,.28); color:#C8F5DF; padding:1px 7px; border-radius:8px; font-size:11px; font-weight:700; }
  #arcadenext.ready { background:rgba(106,209,168,.9); color:#143A30; }
  #arcadenext.ready .nu-tx { opacity:1; font-weight:700; }

  /* stop-knop op de mini-game */
  .mgwrap { position:relative; width:100%; max-width:440px; }
  .quitbtn { position:absolute; top:-12px; right:-6px; z-index:5; width:40px; height:40px; border-radius:50%;
    background:#1E1B5E; color:#fff; border:3px solid #6C6CE8; font-size:18px; font-weight:700; line-height:1; cursor:pointer; }
  .quitbtn:active { transform:scale(.92); }

  /* arcade-tussenspel: hub-HUD verbergen */
  body.arcade #goal, body.arcade #hint, body.arcade #vakken, body.arcade #nextup, body.arcade #arcadenext,
  body.arcade #topleft, body.arcade #dimname { display:none !important; }

  /* feestmoment bij nieuwe upgrade */
  #celebrate { z-index:30; }
  #confetti { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .confetti { position:absolute; top:-26px; animation-name:fall; animation-timing-function:linear; animation-iteration-count:1; }
  @keyframes fall { 0%{ transform:translateY(0) rotate(0); opacity:1; } 100%{ transform:translateY(110vh) rotate(680deg); opacity:.85; } }
  .cele-card { animation:pop .45s cubic-bezier(.2,1.2,.4,1); max-width:380px; }
  .cele-burst { font-size:62px; line-height:1.1; animation:burst .8s ease; }
  .cele-name { font-size:21px; font-weight:800; color:#FFD24A; margin:2px 0 8px; }
  @keyframes pop { 0%{ transform:scale(.6); opacity:0; } 70%{ transform:scale(1.05); } 100%{ transform:scale(1); opacity:1; } }
  @keyframes burst { 0%{ transform:scale(.3) rotate(-18deg); } 60%{ transform:scale(1.25) rotate(8deg); } 100%{ transform:scale(1) rotate(0); } }

  #toast { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.8);
    background:#FFD24A; color:#1E1B5E; border:3px solid #1E1B5E; border-radius:18px; font-size:18px; font-weight:700;
    padding:12px 22px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:25; text-align:center; max-width:80%; }
  #toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud" id="topleft"><div id="name"><span class="dot"></span><span id="namelabel">Speler</span></div><button id="ubtn">🛸 UFO garage</button></div>
<div class="hud" id="pts">
  <svg class="star" viewBox="-8 -8 16 16"><path d="M0 -7 L1.6 -1.6 L7 0 L1.6 1.6 L0 7 L-1.6 1.6 L-7 0 L-1.6 -1.6 Z" fill="#FFD24A" stroke="#1E1B5E" stroke-width="1"/></svg>
  <span id="ptsval">0</span>
</div>
<div class="hud" id="vakken"></div>
<div class="hud" id="nextup"></div>
<div class="hud" id="arcadenext"></div>
<div class="hud" id="dimname"></div>
<div id="hint">Sleep om te vliegen — zoek de beams!</div>
<div id="toast"></div>
<div id="mg" class="overlay"><div class="mgwrap"><button id="mgquit" class="quitbtn" aria-label="Stoppen">✕</button><div class="card" id="mgcard"></div></div></div>
<div id="up" class="overlay"><div class="card" id="upcard"></div></div>
<div id="start" class="overlay"><div class="card" id="startcard"></div></div>
<div id="celebrate" class="overlay"><div id="confetti"></div><div class="card cele-card" id="celcard"></div></div>
<div id="arcres" class="overlay"><div class="card cele-card" id="arcard"></div></div>
<div id="extra" class="overlay"><div class="card cele-card" id="extracard"></div></div>
<div id="newufo" class="overlay"><div class="card cele-card" id="newufocard"></div></div>

<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
window.addEventListener('resize',resize); resize();

function rnd(a,b){ return a+Math.random()*(b-a); }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }
function ellipse(g,x,y,rx,ry){ g.beginPath(); g.ellipse(x,y,rx,ry,0,0,6.2832); }
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
function star4(g,x,y,s){ g.beginPath(); g.moveTo(x,y-s); g.lineTo(x+s*0.32,y-s*0.32); g.lineTo(x+s,y); g.lineTo(x+s*0.32,y+s*0.32); g.lineTo(x,y+s); g.lineTo(x-s*0.32,y+s*0.32); g.lineTo(x-s,y); g.lineTo(x-s*0.32,y-s*0.32); g.closePath(); g.fill(); }

const C_NAVY='#1E1B5E', C_BODY='#33C9C6', C_DOME='#A6E4EE', C_PINK='#F58BB0', C_LIGHT='#FFD24A', C_LEG='#8B7BD8';
const SUBJECTS={ rekenen:{color:'#FFD24A',core:'#FFE7A0',label:'Rekenen',icon:'plus'},
  logica:{color:'#97C459',core:'#C8E6A0',label:'Logica',icon:'dots'},
  lezen:{color:'#5BA8E8',core:'#C2E1F8',label:'Lezen',icon:'book'},
  klok:{color:'#F2A65A',core:'#FFD9B0',label:'Klok',icon:'clock'},
  vormen:{color:'#C58BE8',core:'#E6CFF5',label:'Vormen',icon:'shapes'},
  ruimte:{color:'#33C9C6',core:'#BEEDEB',label:'Wereldoriëntatie',icon:'world'},
  geld:{color:'#6AD1A8',core:'#C6EFDD',label:'Geld',icon:'coin'},
  tellen:{color:'#F58BB0',core:'#FAD0DF',label:'Tellen',icon:'count'},
  ruimtelijk:{color:'#F0916B',core:'#FBD3C2',label:'Ruimtelijk',icon:'compass'} };
// volgorde van de vakken (1 beam per vak per ruimte)
const SUBJECT_ORDER=['rekenen','logica','klok','vormen','geld','tellen','ruimte','ruimtelijk','lezen'];
const PALETTE=['#33C9C6','#6AD1A8','#F2A65A','#C58BE8','#5BA8E8','#F58BB0','#FFD24A'];
const BH_GOAL=100;

// ---- save / load (localStorage) ----
const SAVE_KEY='cosmo.save.v1';
let saveTimer=null, wiping=false;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveState,250); }
function saveState(){
  if(wiping) return;
  try{
    const data={ v:1, name:playerName, points, starsHere, active, level, semester, arcadeConsumed, ufoColor:ufo.color, domeColor:ufo.dome, ufoModel, feat:{...feat}, equip:{...equip}, style:{...style},
      dims: dims.map(d=>({ beams:d.beams.map(b=>({x:b.x,y:b.y,subject:b.subject,played:b.played,score:b.score||0})), bh:d.blackhole.unlocked })) };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){}
}
function loadRaw(){ try{ return JSON.parse(localStorage.getItem(SAVE_KEY)||'null'); }catch(e){ return null; } }
function applySave(data){
  if(!data) return false;
  playerName=data.name||playerName; points=data.points||0; starsHere=data.starsHere||0;
  level=data.level||1; semester=data.semester||2; arcadeConsumed=data.arcadeConsumed||0; active=Math.min(data.active||0, dims.length-1);
  if(data.ufoColor) ufo.color=data.ufoColor;
  if(data.domeColor) ufo.dome=data.domeColor;
  if(data.ufoModel) ufoModel=data.ufoModel;
  if(data.style) Object.assign(style, data.style);
  if(data.feat) Object.assign(feat, data.feat);
  if(data.equip) Object.assign(equip, data.equip);
  else { equip.trail=feat.trail; equip.wings=feat.wings; equip.turbo=feat.turbo; equip.gold=feat.gold; } // oude saves
  applyEquip();
  if(Array.isArray(data.dims)){
    data.dims.forEach((sd,i)=>{ const d=dims[i]; if(!d) return;
      // beam-indeling komt altijd uit DIM_SPECS (1 per vak); herstel enkel 'gespeeld' per vak
      if(Array.isArray(sd.beams)){ const bySub={}; sd.beams.forEach(b=>{ if(b.played) bySub[b.subject]=Math.max(bySub[b.subject]||0, b.score||0); });
        d.beams.forEach(b=>{ if(b.subject in bySub){ b.played=true; b.score=bySub[b.subject]; } else { b.played=false; b.score=0; } }); }
      d.blackhole.unlocked = allPlayed(d); });
  }
  cur=dims[active];
  return true;
}

const DIM_SPECS=[

function buildDimension(spec){
  const d={ name:spec.name, bg:spec.bg, star:spec.star, w:spec.w, h:spec.h, rockTint:spec.rockTint, rockCrater:spec.rockCrater,
    beams:spec.beams.map(b=>({x:b.x,y:b.y,subject:b.subject,r:54,cool:0,phase:Math.random()*6,played:false,score:0})),
    blackhole:{x:spec.blackhole.x,y:spec.blackhole.y,target:spec.blackhole.target,r:44,cool:0,unlocked:false},
    portal:{x:spec.portal.x,y:spec.portal.y,r:48,cool:0,phase:Math.random()*6},
    rocks:[], layers:[] };
  for(let i=0;i<spec.rockCount;i++) d.rocks.push(makeRock(d));
  const defs=[{f:0.30,s:0.9,a:0.55},{f:0.55,s:1.3,a:0.8},{f:0.85,s:1.8,a:1}];
  for(const df of defs){ const st=[]; const n=Math.round(d.w*d.h/(df.f<0.4?110000:df.f<0.7?150000:240000));
    for(let i=0;i<n;i++)st.push({x:rnd(0,d.w),y:rnd(0,d.h),sz:df.s*rnd(0.7,1.3)}); d.layers.push({f:df.f,a:df.a,s:df.s,st}); }
  return d;
}
function makeRock(d){
  const r=rnd(26,52); let x,y,ok,tries=0;
  do{ x=rnd(120,d.w-120); y=rnd(120,d.h-120); ok=true; tries++;
    for(const b of d.beams) if(Math.hypot(x-b.x,y-b.y)<b.r+r+120) ok=false;
    if(Math.hypot(x-d.blackhole.x,y-d.blackhole.y)<r+150) ok=false;
    if(d.portal && Math.hypot(x-d.portal.x,y-d.portal.y)<r+150) ok=false;
    if(Math.hypot(x-340,y-340)<280) ok=false;
  } while(!ok&&tries<60);
  const pts=[]; const n=Math.floor(rnd(7,10)); for(let k=0;k<n;k++)pts.push(rnd(0.74,1));
  const drift=Math.random()<0.55;
  return {x,y,r,vx:drift?rnd(-30,30):0,vy:drift?rnd(-30,30):0,rot:rnd(0,6.28),vr:rnd(-0.5,0.5),pts,tint:d.rockTint,crater:d.rockCrater};
}

// tik = schieten (arcade), slepen = vliegen
let tapInfo=null;
function tapStart(x,y){ tapInfo={x,y,t:performance.now(),moved:false}; }
function tapMove(x,y){ if(tapInfo && Math.hypot(x-tapInfo.x,y-tapInfo.y)>14) tapInfo.moved=true; }
function tapEnd(x,y){ if(tapInfo && mode==='arcade' && !tapInfo.moved && (performance.now()-tapInfo.t)<320) shootAt(x,y); tapInfo=null; }
cv.addEventListener('touchstart',e=>{e.preventDefault(); const p=ptr(e); stick={active:true,bx:p.x,by:p.y,cx:p.x,cy:p.y,id:p.id}; tapStart(p.x,p.y);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault(); if(!stick.active)return; for(const t of e.touches){ if(t.identifier===stick.id){ stick.cx=t.clientX; stick.cy=t.clientY; tapMove(t.clientX,t.clientY); } }},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault(); stick.active=false; tapEnd(stick.cx,stick.cy);},{passive:false});
cv.addEventListener('touchcancel',e=>{stick.active=false; tapInfo=null;});

addEventListener('mousemove',e=>{ if(stick.active&&stick.id==='m'){ stick.cx=e.clientX; stick.cy=e.clientY; tapMove(e.clientX,e.clientY); }});
addEventListener('mouseup',e=>{ if(stick.id==='m'){ stick.active=false; tapEnd(e.clientX,e.clientY); } });
function thrustVec(){
  let tx=0,ty=0;
  if(keys['arrowleft']||keys['a'])tx-=1; if(keys['arrowright']||keys['d'])tx+=1;
  if(keys['arrowup']||keys['w'])ty-=1; if(keys['arrowdown']||keys['s'])ty+=1;
  if(tx||ty){ const l=Math.hypot(tx,ty); return {x:tx/l,y:ty/l,m:1}; }
  if(stick.active){ let dx=stick.cx-stick.bx, dy=stick.cy-stick.by; const d=Math.hypot(dx,dy);
    if(d>6){ const m=Math.min(d/55,1); return {x:dx/d,y:dy/d,m}; } }
  return {x:0,y:0,m:0};
}

let points=0, starsHere=0, paused=false, hintTimer=6;
// alien-spel ontgrendelt elke 50 sterren; verdwijnt na 1 keer spelen
const ARCADE_STEP=40;
let arcadeConsumed=0, arcadeAvail=false, arcadeAnnouncePending=false;
function arcadeMilestones(){ return Math.floor(points/ARCADE_STEP); }
let trail=[], trailAcc=0;
const cam={x:0,y:0};
let last=performance.now();

function update(dt){
  if(paused) return;
  const t=thrustVec();
  ufo.vx+=t.x*ACCEL*t.m*dt; ufo.vy+=t.y*ACCEL*t.m*dt;
  const fr=Math.exp(-FRICTION*dt); ufo.vx*=fr; ufo.vy*=fr;
  const sp=Math.hypot(ufo.vx,ufo.vy);
  if(sp>curMaxV){ ufo.vx=ufo.vx/sp*curMaxV; ufo.vy=ufo.vy/sp*curMaxV; }
  ufo.x+=ufo.vx*dt; ufo.y+=ufo.vy*dt;
  const m=46;
  if(ufo.x<m){ufo.x=m; ufo.vx=Math.abs(ufo.vx)*0.4;} if(ufo.x>cur.w-m){ufo.x=cur.w-m; ufo.vx=-Math.abs(ufo.vx)*0.4;}
  if(ufo.y<m){ufo.y=m; ufo.vy=Math.abs(ufo.vy)*0.4;} if(ufo.y>cur.h-m){ufo.y=cur.h-m; ufo.vy=-Math.abs(ufo.vy)*0.4;}
  if(ufo.invuln>0)ufo.invuln-=dt; if(ufo.shake>0)ufo.shake-=dt;

  if(equip.trail && sp>50){ trailAcc+=dt; if(trailAcc>0.05){ trailAcc=0; trail.push({x:ufo.x,y:ufo.y,life:0.55}); if(trail.length>44)trail.shift(); } }
  for(const tr of trail) tr.life-=dt; trail=trail.filter(tr=>tr.life>0);

  for(const r of cur.rocks){
    r.x+=r.vx*dt; r.y+=r.vy*dt; r.rot+=r.vr*dt;
    if(r.x<r.r||r.x>cur.w-r.r)r.vx*=-1; if(r.y<r.r||r.y>cur.h-r.r)r.vy*=-1;
    const dx=ufo.x-r.x, dy=ufo.y-r.y, d=Math.hypot(dx,dy), min=r.r+40;
    if(d<min && ufo.invuln<=0){ const nx=dx/(d||1), ny=dy/(d||1); ufo.x=r.x+nx*min; ufo.y=r.y+ny*min;
      const dot=ufo.vx*nx+ufo.vy*ny; ufo.vx=(ufo.vx-2*dot*nx)*0.6; ufo.vy=(ufo.vy-2*dot*ny)*0.6; ufo.invuln=0.45; ufo.shake=0.35; }
  }
  for(const b of cur.beams){ if(b.cool>0)b.cool-=dt; b.phase+=dt; }
  const bh=cur.blackhole; if(bh.cool>0)bh.cool-=dt;
  for(const b of cur.beams){ if(b.cool<=0 && b.score<10 && Math.hypot(ufo.x-b.x,ufo.y-b.y)<b.r+10){ openMiniGame(b); break; } }
  if(bh.unlocked && bh.cool<=0 && Math.hypot(ufo.x-bh.x,ufo.y-bh.y)<bh.r){ travel(bh.target); }
  const pt=cur.portal; if(pt && arcadeAvail){ pt.phase+=dt; if(pt.cool>0)pt.cool-=dt; else if(Math.hypot(ufo.x-pt.x,ufo.y-pt.y)<pt.r){ startArcade(); } }

  const tx=ufo.x-W/2, ty=ufo.y-H/2;
  cam.x+=(tx-cam.x)*Math.min(1,dt*6); cam.y+=(ty-cam.y)*Math.min(1,dt*6);
  cam.x=Math.max(0,Math.min(cur.w-W,cam.x)); if(W>cur.w)cam.x=(cur.w-W)/2;
  cam.y=Math.max(0,Math.min(cur.h-H,cam.y)); if(H>cur.h)cam.y=(cur.h-H)/2;
  if(hintTimer>0){ hintTimer-=dt; if(hintTimer<=0) document.getElementById('hint').style.opacity=0; }
}

function travel(target){
  active=target; cur=dims[active];
  cur.beams.forEach(b=>{ b.played=false; b.score=0; b.cool=0; }); // nieuwe ruimte: alle vakken weer fris
  cur.blackhole.unlocked=false; cur.blackhole.cool=3; starsHere=0;
  const bh=cur.blackhole; const ang=Math.random()*6.2832;
  ufo.x=Math.max(120,Math.min(cur.w-120,bh.x+Math.cos(ang)*220));
  ufo.y=Math.max(120,Math.min(cur.h-120,bh.y+Math.sin(ang)*220));
  ufo.vx=0; ufo.vy=0; ufo.invuln=1; trail=[];
  cam.x=ufo.x-W/2; cam.y=ufo.y-H/2;
  showDimName(); toast('Welkom in het '+cur.name+'!'); updateGoalHud(); updateVakkenHud(); scheduleSave();
}

function starPath(g,x,y,r){ g.beginPath(); for(let i=0;i<10;i++){ const a=-Math.PI/2+i*Math.PI/5, rad=i%2?r*0.52:r, px=x+Math.cos(a)*rad, py=y+Math.sin(a)*rad; i?g.lineTo(px,py):g.moveTo(px,py); } g.closePath(); }
function drawScoreStar(g,x,y,score,perfect,color){

function drawBeamIcon(g,b,s){

  else if(s.icon==='dots'){ for(const p of [[-6,-6],[6,-6],[-6,6],[6,6]]){ g.beginPath(); g.arc(p[0],p[1],3,0,6.2832); g.fill(); } }

    g.bezierCurveTo(-10,4,-4,4,0,8); g.bezierCurveTo(4,4,10,4,13,7); g.lineTo(13,-7); g.bezierCurveTo(10,-10,4,-10,0,-6); g.closePath(); g.fill(); }
  else if(s.icon==='clock'){ g.lineWidth=2.6; g.beginPath(); g.arc(0,0,10,0,6.2832); g.stroke();
    g.lineCap='round'; g.beginPath(); g.moveTo(0,0); g.lineTo(0,-6); g.moveTo(0,0); g.lineTo(5,2); g.stroke(); }

    g.save(); g.rotate(-0.5); g.beginPath(); g.ellipse(0,0,13,4.5,0,0,6.2832); g.stroke(); g.restore(); }
  else if(s.icon==='world'){ g.lineWidth=2.4; g.beginPath(); g.arc(0,0,10,0,6.2832); g.stroke();
    g.beginPath(); g.moveTo(-10,0); g.lineTo(10,0); g.stroke();
    g.beginPath(); g.ellipse(0,0,4,10,0,0,6.2832); g.stroke(); }

  g.restore();
}

function render(){
  ctx.clearRect(0,0,W,H); ctx.fillStyle=cur.bg; ctx.fillRect(0,0,W,H);
  const sh=ufo.shake>0?(Math.random()-0.5)*8*(ufo.shake/0.35):0, sh2=ufo.shake>0?(Math.random()-0.5)*8*(ufo.shake/0.35):0;
  for(const L of cur.layers){ ctx.fillStyle='rgba('+cur.star+','+L.a+')';
    for(const s of L.st){ const px=s.x-cam.x*L.f, py=s.y-cam.y*L.f; if(px<-5||px>W+5||py<-5||py>H+5)continue; ctx.beginPath(); ctx.arc(px,py,s.sz,0,6.2832); ctx.fill(); } }

  ctx.save(); ctx.translate(-cam.x+sh,-cam.y+sh2);
  ctx.strokeStyle='rgba(255,255,255,.10)'; ctx.lineWidth=6; ctx.strokeRect(3,3,cur.w-6,cur.h-6);
  if(cur.blackhole.unlocked) drawBlackhole(cur.blackhole);
  if(cur.portal && arcadeAvail) drawPortal(cur.portal);

  // trail (spoor) — type lijntjes / sterren / bollen
  if(style.trail==='lijntjes'){ ctx.lineCap='round';
    for(let i=1;i<trail.length;i++){ const a=trail[i].life/0.55; ctx.strokeStyle='rgba(255,210,74,'+(a*0.8)+')'; ctx.lineWidth=2+a*3;
      ctx.beginPath(); ctx.moveTo(trail[i-1].x,trail[i-1].y); ctx.lineTo(trail[i].x,trail[i].y); ctx.stroke(); } }
  else { for(const tr of trail){ const a=tr.life/0.55; ctx.fillStyle='rgba(255,210,74,'+(a*0.8)+')';
      if(style.trail==='bollen'){ ctx.beginPath(); ctx.arc(tr.x,tr.y,2+a*3,0,6.2832); ctx.fill(); }
      else star4(ctx,tr.x,tr.y,2+a*3); } }

  for(const b of cur.beams){
    const s=SUBJECTS[b.subject]; const perfect=b.score>=10; const op=perfect?0.3:(b.played?0.7:1); const pulse=0.5+0.5*Math.sin(b.phase*2);
    ctx.globalAlpha=op;
    ctx.fillStyle=hexA(s.color,0.14+pulse*0.05);
    ctx.beginPath(); ctx.moveTo(b.x-14,b.y-6); ctx.lineTo(b.x+14,b.y-6); ctx.lineTo(b.x+70,b.y+150); ctx.lineTo(b.x-70,b.y+150); ctx.closePath(); ctx.fill();
    ctx.fillStyle=hexA(s.color,0.30); ctx.beginPath(); ctx.arc(b.x,b.y,b.r*(1+pulse*0.12),0,6.2832); ctx.fill();
    ctx.fillStyle=s.core; ctx.strokeStyle=C_NAVY; ctx.lineWidth=3.5; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.42,0,6.2832); ctx.fill(); ctx.stroke();
    drawBeamIcon(ctx,b,s);
    ctx.fillStyle='#fff'; ctx.font='600 16px -apple-system,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(s.label, b.x, b.y+b.r+6);
    if(b.played){ drawScoreStar(ctx, b.x, b.y+b.r+30, b.score, perfect, s.color); }
    ctx.globalAlpha=1;
  }
  for(const r of cur.rocks){
    ctx.save(); ctx.translate(r.x,r.y); ctx.rotate(r.rot);
    ctx.fillStyle=r.tint; ctx.strokeStyle=C_NAVY; ctx.lineWidth=3.5; ctx.lineJoin='round';
    ctx.beginPath(); const n=r.pts.length;
    for(let k=0;k<n;k++){ const a=k/n*6.2832, rr=r.r*r.pts[k], x=Math.cos(a)*rr, y=Math.sin(a)*rr; k?ctx.lineTo(x,y):ctx.moveTo(x,y); }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle=r.crater; ctx.beginPath(); ctx.arc(r.r*0.2,-r.r*0.15,r.r*0.18,0,6.2832); ctx.fill();
    ctx.beginPath(); ctx.arc(-r.r*0.3,r.r*0.25,r.r*0.12,0,6.2832); ctx.fill(); ctx.restore();
  }

  ctx.save(); ctx.translate(ufo.x,ufo.y);
  const bank=Math.max(-0.28,Math.min(0.28,ufo.vx/curMaxV*0.4)); const sp=Math.hypot(ufo.vx,ufo.vy);
  if(equip.gold){ for(let i=3;i>=1;i--){ ctx.fillStyle='rgba(255,210,74,'+(0.06*i)+')'; ctx.beginPath(); ctx.arc(0,4,40+i*9,0,6.2832); ctx.fill(); } }
  if(sp>40){ const ang=Math.atan2(ufo.vy,ufo.vx); ctx.save(); ctx.rotate(ang);
    if(equip.turbo){ drawExhaust(ctx, style.turbo, sp); }
    else { ctx.fillStyle='rgba(245,139,176,.5)'; ctx.beginPath(); ctx.ellipse(-46,18,16+sp*0.04,9,0,0,6.2832); ctx.fill(); }
    ctx.restore(); }
  ctx.rotate(bank);
  if(!(ufo.invuln>0 && Math.floor(ufo.invuln*16)%2)) drawUFO(ctx,0.62);
  ctx.restore();

  ctx.restore();
  drawMinimap(); drawOffscreenHint();
}
function drawMinimap(){
  const mw=110, mh=Math.round(mw*cur.h/cur.w), px=W-mw-14, py=H-mh-14;
  ctx.fillStyle='rgba(30,27,94,.55)'; roundRect(ctx,px,py,mw,mh,8); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1; ctx.stroke();
  const sx=mw/cur.w, sy=mh/cur.h;
  for(const r of cur.rocks){ ctx.fillStyle='rgba(255,255,255,.3)'; ctx.beginPath(); ctx.arc(px+r.x*sx,py+r.y*sy,1.4,0,6.2832); ctx.fill(); }
  for(const b of cur.beams){ ctx.globalAlpha=b.played?0.4:1; ctx.fillStyle=SUBJECTS[b.subject].color; ctx.beginPath(); ctx.arc(px+b.x*sx,py+b.y*sy,3.2,0,6.2832); ctx.fill(); ctx.globalAlpha=1; }
  if(cur.blackhole.unlocked){ const bh=cur.blackhole; ctx.fillStyle='#120C2C'; ctx.beginPath(); ctx.arc(px+bh.x*sx,py+bh.y*sy,3.6,0,6.2832); ctx.fill(); ctx.strokeStyle='#C58BE8'; ctx.lineWidth=1.4; ctx.stroke(); }
  if(cur.portal && arcadeAvail){ const p=cur.portal; ctx.fillStyle='#6AD1A8'; ctx.beginPath(); ctx.arc(px+p.x*sx,py+p.y*sy,3.4,0,6.2832); ctx.fill(); ctx.strokeStyle='#1E1B5E'; ctx.lineWidth=1.2; ctx.stroke(); }
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(px+ufo.x*sx,py+ufo.y*sy,2.6,0,6.2832); ctx.fill();
}
function drawOffscreenHint(){
  const pois=cur.beams.filter(b=>!b.played).map(b=>({x:b.x,y:b.y,c:SUBJECTS[b.subject].color}));
  if(cur.blackhole.unlocked) pois.push({x:cur.blackhole.x,y:cur.blackhole.y,c:'#C58BE8'});
  if(cur.portal && arcadeAvail) pois.push({x:cur.portal.x,y:cur.portal.y,c:'#6AD1A8'});
  let best=null,bd=1e9; for(const p of pois){ const d=Math.hypot(ufo.x-p.x,ufo.y-p.y); if(d<bd){bd=d;best=p;} }
  if(!best) return; const sx=best.x-cam.x, sy=best.y-cam.y;
  if(sx>40&&sx<W-40&&sy>40&&sy<H-40) return;
  const ang=Math.atan2(sy-H/2,sx-W/2), ex=W/2+Math.cos(ang)*(Math.min(W,H)/2-46), ey=H/2+Math.sin(ang)*(Math.min(W,H)/2-46);
  ctx.save(); ctx.translate(ex,ey); ctx.rotate(ang); ctx.fillStyle=best.c; ctx.strokeStyle=C_NAVY; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(12,0); ctx.lineTo(-8,-8); ctx.lineTo(-8,8); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
}

function updateArcade(dt){
  if(arcade.over) return;
  arcade.time-=dt; if(arcade.time<=0){ arcade.time=0; endArcade(); return; }
  const t=thrustVec(); ufo.vx+=t.x*ACCEL*t.m*dt; ufo.vy+=t.y*ACCEL*t.m*dt;
  const fr=Math.exp(-FRICTION*dt); ufo.vx*=fr; ufo.vy*=fr;
  const sp=Math.hypot(ufo.vx,ufo.vy); if(sp>curMaxV){ ufo.vx=ufo.vx/sp*curMaxV; ufo.vy=ufo.vy/sp*curMaxV; }
  ufo.x+=ufo.vx*dt; ufo.y+=ufo.vy*dt;
  const m=42; ufo.x=Math.max(m,Math.min(W-m,ufo.x)); ufo.y=Math.max(m,Math.min(H-m,ufo.y));
  if(ufo.invuln>0)ufo.invuln-=dt; if(ufo.shake>0)ufo.shake-=dt;
  const g=arcade.game;
  // rotsblokken: drijven + botsing (zacht bij aliens/sterren, hartje kwijt bij asteroïden-storm)
  for(const rk of arcade.rocks){ rk.x+=rk.vx*dt; rk.y+=rk.vy*dt; rk.rot+=rk.vr*dt;
    if(rk.x<rk.r||rk.x>W-rk.r)rk.vx*=-1; if(rk.y<rk.r||rk.y>H-rk.r)rk.vy*=-1;
    const dx=ufo.x-rk.x, dy=ufo.y-rk.y, d=Math.hypot(dx,dy), min=rk.r+34;
    if(d<min){ const nx=dx/(d||1), ny=dy/(d||1); ufo.x=rk.x+nx*min; ufo.y=rk.y+ny*min;
      const dot=ufo.vx*nx+ufo.vy*ny; ufo.vx=(ufo.vx-2*dot*nx)*0.6; ufo.vy=(ufo.vy-2*dot*ny)*0.6;
      if(g==='rotsen' && ufo.invuln<=0){ arcade.hearts--; ufo.invuln=1.2; ufo.shake=0.4; if(arcade.hearts<=0){ endArcade(); return; } } } }
  if(g==='aliens'){
    arcade.spawnAcc+=dt; if(arcade.spawnAcc>0.6 && arcade.targets.length<8){ arcade.spawnAcc=0; spawnTarget(); }
    const ylim=Math.max(140,H*0.7);
    for(const tg of arcade.targets){ tg.x+=tg.vx*dt; tg.y+=tg.vy*dt; tg.phase+=dt;
      if(tg.x<tg.r){tg.x=tg.r;tg.vx*=-1;} if(tg.x>W-tg.r){tg.x=W-tg.r;tg.vx*=-1;}
      if(tg.y<tg.r){tg.y=tg.r;tg.vy*=-1;} if(tg.y>ylim){tg.y=ylim;tg.vy*=-1;} }
    for(const b of arcade.bullets){ b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
      for(let i=arcade.targets.length-1;i>=0;i--){ const tg=arcade.targets[i];
        if(Math.hypot(b.x-tg.x,b.y-tg.y)<tg.r+4){ b.life=0; arcade.targets.splice(i,1); arcade.score++; addStars(1);
          arcade.pops.push({x:tg.x,y:tg.y,life:0.5,col:tg.col}); break; } } }
    arcade.bullets=arcade.bullets.filter(b=>b.life>0 && b.x>-20 && b.x<W+20 && b.y>-20 && b.y<H+20);
  }
  else if(g==='sterren'){
    arcade.spawnAcc+=dt; if(arcade.spawnAcc>0.5 && arcade.stars.length<9){ arcade.spawnAcc=0; spawnStar(); }
    for(let i=arcade.stars.length-1;i>=0;i--){ const st=arcade.stars[i]; st.x+=st.vx*dt; st.y+=st.vy*dt; st.phase+=dt;
      if(st.x<st.r||st.x>W-st.r)st.vx*=-1; if(st.y<st.r||st.y>H-st.r)st.vy*=-1;
      if(Math.hypot(ufo.x-st.x,ufo.y-st.y)<st.r+30){ arcade.stars.splice(i,1); arcade.score++; addStars(1); arcade.pops.push({x:st.x,y:st.y,life:0.5,col:'#FFD24A'}); } }
  }
  else if(g==='ringen'){
    const rg=arcade.rings[0]; if(rg){ rg.phase+=dt;
      if(Math.hypot(ufo.x-rg.x,ufo.y-rg.y)<rg.r*0.7){ arcade.score++; addStars(1); arcade.pops.push({x:rg.x,y:rg.y,life:0.5,col:'#6AD1A8'}); spawnRing(); } }
  }
  else if(g==='rotsen'){
    arcade.spawnAcc+=dt; const elapsed=60-arcade.time, wantRocks=5+Math.floor(elapsed/8);
    if(arcade.spawnAcc>1.2 && arcade.rocks.length<wantRocks){ arcade.spawnAcc=0; spawnArcadeRock(); }

  }

// moeilijkheidsgraad schaalt met gekozen leerjaar (level 1..6)
function ri(a,b){ return Math.floor(rnd(a,b+1)); }   // willekeurig geheel getal a..b (incl.)
function pick(a){ return a[Math.floor(rnd(0,a.length))]; }
// kies een item maar vermijd de laatst gebruikte (meer variatie)
let woRecent=[], leesRecent=[];
function pickFresh(pool, recent, keep){
  const avail=pool.filter(x=>!recent.includes(x));
  const it=pick(avail.length?avail:pool);
  recent.push(it); while(recent.length>keep) recent.shift();
  return it;
}

// Leerjaar 1
function q_LJ1_S1(){ // S1: getalbegrip & rekenen tot 10
  switch(ri(1,4)){
    case 1: { const x=ri(1,9), y=ri(1,10-x); return {q:x+' + '+y+' = ?', ans:x+y}; }   // optellen tot 10
    case 2: { const a=ri(3,10), b=ri(1,a-1); return {q:a+' − '+b+' = ?', ans:a-b}; }    // aftrekken tot 10
    case 3: { const t=ri(6,10), a=ri(1,t-1); return {q:a+' + ? = '+t, ans:t-a}; }       // aanvullen
    default:{ const a=ri(1,9); return {q:a+' + ? = 10', ans:10-a}; }                     // tienvriendjes
  }
}
function q_LJ1_S2(){ // S2: rekenen tot 20, met brug over het tiental
  switch(ri(1,4)){
    case 1: { const a=ri(11,17), b=ri(1,19-a); return {q:a+' + '+b+' = ?', ans:a+b}; }  // optellen tot 20
    case 2: { let a,b; do{ a=ri(5,9); b=ri(2,9); }while(a+b<=10||a+b>18); return {q:a+' + '+b+' = ?', ans:a+b}; } // brug over 10
    case 3: { const a=ri(12,20), b=ri(1,a-1); return {q:a+' − '+b+' = ?', ans:a-b}; }   // aftrekken tot 20
    default:{ const t=ri(13,20), a=ri(2,t-2); return {q:a+' + ? = '+t, ans:t-a}; }       // aanvullen tot 20
  }
}
// Leerjaar 2
function q_LJ2_S1(){ // S1: rekenen tot 100, tafels van 2/5/10, dubbel/helft
  switch(ri(1,5)){
    case 1: { const a=ri(20,70), b=ri(5,Math.max(6,Math.min(99-a,29))); return {q:a+' + '+b+' = ?', ans:a+b}; }
    case 2: { const a=ri(30,99), b=ri(5,a-5); return {q:a+' − '+b+' = ?', ans:a-b}; }
    case 3: { const t=pick([2,5,10]), b=ri(1,10); return {q:t+' × '+b+' = ?', ans:t*b}; }
    case 4: { const a=ri(2,20); return {q:'dubbel van '+a+' = ?', ans:a*2}; }
    default:{ const h=ri(2,15); return {q:'helft van '+(h*2)+' = ?', ans:h}; }
  }
}
function q_LJ2_S2(){ // S2: vlot tot 100 (brug), tafels 1..5 + 10, deeltafels
  switch(ri(1,5)){
    case 1: { let a,b; do{ a=ri(15,85); b=ri(6,40); }while((a%10)+(b%10)<10 || a+b>100); return {q:a+' + '+b+' = ?', ans:a+b}; }
    case 2: { let a,b; do{ a=ri(25,99); b=ri(6,Math.min(a-1,45)); }while((a%10)>=(b%10)); return {q:a+' − '+b+' = ?', ans:a-b}; }
    case 3: { const t=pick([2,3,4,5,10]), b=ri(2,10); return {q:t+' × '+b+' = ?', ans:t*b}; }
    case 4: { const t=pick([2,3,4,5,10]), b=ri(2,10); return {q:(t*b)+' : '+t+' = ?', ans:b}; } // delen
    default:{ const a=ri(2,25); return {q:'dubbel van '+a+' = ?', ans:a*2}; }
  }
}
// Leerjaar 3..6 (algemeen, semester verhoogt het getalbereik)
function q_generic(){
  const base=[1000,1000,1000,10000,100000,1000000][level-1]||1000;
  const maxSum = semester===2 ? base : Math.round(base/2);
  const r=Math.random();
  if(r<0.4){ const a=ri(2,12), b=ri(2,12); return Math.random()<0.5 ? {q:a+' × '+b+' = ?', ans:a*b} : {q:(a*b)+' : '+a+' = ?', ans:b}; }
  if(r<0.7){ const a=ri(Math.round(maxSum*0.2)+2,maxSum), b=ri(2,a-1); return {q:a+' − '+b+' = ?', ans:a-b}; }
  const a=ri(2,maxSum), b=ri(2,Math.max(3,maxSum-a)); return {q:a+' + '+b+' = ?', ans:a+b};
}
function genMath(){

function genSeq(){
  let steps;
  if(level===1) steps = semester===1 ? [1,2] : [2,5,10];
  else if(level===2) steps = semester===1 ? [2,5,10] : [4,5,25,50];
  else if(level<=4) steps = [3,5,10,25];
  else steps = [7,25,50,100];
  const step=pick(steps);
  let start = ri(1,9); if(level>=2 && semester===2) start *= 2;
  const arr=[start,start+step,start+2*step,start+3*step], ans=start+4*step;
  return {q:arr.join('  ·  ')+'  ·  ?', ans, seq:true};
}
function distractors(ans){ const set=new Set([ans]), out=[]; const sp=Math.max(4,Math.round(ans*0.12));
  while(out.length<2){ let d=ans+Math.floor(rnd(-sp,sp+1)); if(d<0)d=ans+Math.floor(rnd(1,sp+1)); if(!set.has(d)){ set.add(d); out.push(d); } } return out; }
function numOpts(ans){ return [ans,...distractors(ans)].map(String).sort(()=>Math.random()-0.5); }

// ===== KLOK lezen =====
function nextHour(h){ return h===12?1:h+1; }
function clockLabel(h,m){
  if(m===0) return h+' uur';
  if(m===15) return 'kwart over '+h;
  if(m===30) return 'half '+nextHour(h);
  if(m===45) return 'kwart voor '+nextHour(h);
  return h+'u'+m;
}
function drawClock(g,w,hh,hour,min){
  const cx=w/2, cy=hh/2, R=Math.min(w,hh)/2-6; g.lineJoin='round'; g.lineCap='round';
  g.fillStyle='#fff'; g.strokeStyle=C_NAVY; g.lineWidth=4; g.beginPath(); g.arc(cx,cy,R,0,6.2832); g.fill(); g.stroke();
  g.fillStyle=C_NAVY; g.font='bold '+(R*0.2)+'px -apple-system,sans-serif'; g.textAlign='center'; g.textBaseline='middle';
  for(let n=1;n<=12;n++){ const a=(n/12)*6.2832-Math.PI/2; g.fillText(n, cx+Math.cos(a)*R*0.8, cy+Math.sin(a)*R*0.8); }
  const ma=(min/60)*6.2832-Math.PI/2, ha=(((hour%12)+min/60)/12)*6.2832-Math.PI/2;
  g.strokeStyle=C_NAVY; g.lineWidth=5; g.beginPath(); g.moveTo(cx,cy); g.lineTo(cx+Math.cos(ha)*R*0.45, cy+Math.sin(ha)*R*0.45); g.stroke();
  g.strokeStyle='#F58BB0'; g.lineWidth=4; g.beginPath(); g.moveTo(cx,cy); g.lineTo(cx+Math.cos(ma)*R*0.68, cy+Math.sin(ma)*R*0.68); g.stroke();
  g.fillStyle=C_NAVY; g.beginPath(); g.arc(cx,cy,4.5,0,6.2832); g.fill();
}
function genKlok(){
  // begin van 't jaar = makkelijker (hele/halve uren), einde = + kwartieren
  let mins;
  if(level<=2) mins = semester===1 ? [0] : [0,30];
  else mins = semester===1 ? [0,30] : [0,15,30,45];
  const h=ri(1,12), m=pick(mins), label=clockLabel(h,m);
  const opts=new Set([label]); let t=0;
  while(opts.size<3 && t<40){ t++; opts.add(clockLabel(ri(1,12),pick(mins))); }
  while(opts.size<3) opts.add(ri(1,12)+' uur');
  return { prompt:'Hoe laat is het?', draw:(g,w,hh)=>drawClock(g,w,hh,h,m), options:[...opts].sort(()=>Math.random()-0.5), correct:label, wide:true };
}

  if(s.id==='rechthoek'){ roundRect(g,cx-R,cy-R*0.62,R*2,R*1.24,9); g.fill(); g.stroke(); return; }
  if(s.id==='vierkant'){ roundRect(g,cx-R*0.86,cy-R*0.86,R*1.72,R*1.72,9); g.fill(); g.stroke(); return; }
  if(s.id==='ster'){ g.beginPath(); for(let i=0;i<10;i++){ const a=-Math.PI/2+i*Math.PI/5, rad=i%2?R*0.42:R*0.95, x=cx+Math.cos(a)*rad, y=cy+Math.sin(a)*rad; i?g.lineTo(x,y):g.moveTo(x,y); } g.closePath(); g.fill(); g.stroke(); return; }
  const n=s.sides; g.beginPath();
  for(let i=0;i<n;i++){ const a=-Math.PI/2+i/n*6.2832, x=cx+Math.cos(a)*R*0.92, y=cy+Math.sin(a)*R*0.92; i?g.lineTo(x,y):g.moveTo(x,y); }
  g.closePath(); g.fill(); g.stroke();
}
function genVormen(){
  // begin = basisvormen + naam; einde = alle vormen + soms 'hoeveel hoeken'
  const basic=SHAPES.filter(s=>['cirkel','driehoek','vierkant','rechthoek'].includes(s.id));
  const pool = semester===1 ? basic : SHAPES;
  const s=pick(pool);
  if(semester===2 && s.sides>0 && Math.random()<0.4){
    const opts=new Set([String(s.sides)]); while(opts.size<3) opts.add(String(ri(3,7)));
    return { prompt:'Hoeveel hoeken?', draw:(g,w,h)=>drawShape(g,w,h,s), options:[...opts].sort(()=>Math.random()-0.5), correct:String(s.sides), wide:false };
  }
  const names=pool.map(x=>x.name), opts=new Set([s.name]); while(opts.size<3) opts.add(pick(names));
  return { prompt:'Welke vorm is dit?', draw:(g,w,h)=>drawShape(g,w,h,s), options:[...opts].sort(()=>Math.random()-0.5), correct:s.name, wide:true };
}

// ===== GELD (munten tellen) =====
function coinLabel(c){ return c>=100 ? (c/100)+'€' : c+'c'; }
function formatMoney(cents){ const e=Math.floor(cents/100), c=cents%100;
  if(c===0) return e+' euro'; if(e===0) return c+' cent'; return e+' euro '+c; }
function drawCoins(g,w,h,coins){
  const per=Math.min(coins.length,4), r=20, gap=14, rows=Math.ceil(coins.length/per);
  const rowW=per*(r*2)+(per-1)*gap, x0=(w-rowW)/2+r, y0=h/2-((rows-1)*(r*2+10))/2;
  coins.forEach((c,i)=>{ const col=i%per, row=Math.floor(i/per);
    const x=x0+col*(r*2+gap), y=y0+row*(r*2+10);
    g.fillStyle = c>=100?'#FFD24A':'#D9DCE6'; g.strokeStyle=C_NAVY; g.lineWidth=3;
    g.beginPath(); g.arc(x,y,r,0,6.2832); g.fill(); g.stroke();
    g.fillStyle=C_NAVY; g.font='bold 13px -apple-system,sans-serif'; g.textAlign='center'; g.textBaseline='middle'; g.fillText(coinLabel(c),x,y); });
}
function geldOpts(total){ const opts=new Set([formatMoney(total)]); let t=0;
  while(opts.size<3 && t<50){ t++; const d=total+pick([-200,-100,-50,50,100,200]); if(d>=50) opts.add(formatMoney(d)); }
  while(opts.size<3) opts.add(formatMoney(total+100*(opts.size+1)));
  return [...opts].sort(()=>Math.random()-0.5); }
// munten tellen (bestaande oefening)
function genGeldMunten(){
  const pool = semester===1 ? [100,200] : [50,100,200];
  const n = semester===1 ? ri(1,3) : ri(2,4);
  const coins=[]; let total=0; for(let i=0;i<n;i++){ const c=pick(pool); coins.push(c); total+=c; }
  return { prompt:'Hoeveel geld is dit?', draw:(g,w,h)=>drawCoins(g,w,h,coins), options:geldOpts(total), correct:formatMoney(total), wide:true };
}

function genGeldVraagstuk(){
  const w=pick(GELD_WINKELS), n=semester===1?2:3;
  let pool=w.items.filter(it=> semester===1 ? it[1]%100===0 : true); if(pool.length<n) pool=w.items.slice();
  const chosen=[], used=new Set();
  while(chosen.length<n && used.size<pool.length){ const it=pick(pool); if(!used.has(it[0])){ used.add(it[0]); chosen.push(it); } }
  let total=0; chosen.forEach(it=>total+=it[1]);
  const lijst=chosen.map(it=>'• '+it[0]+' ('+formatMoney(it[1])+')').join('<br>');
  const formule=chosen.map(it=>formatMoney(it[1])).join(' + ')+' = ?';
  const prompt='<div class="lees-text">'+w.wie+' koopt bij '+w.naam+':<br>'+lijst+'</div>'+
    '<div class="lees-q">Hoeveel moet '+w.wie+' betalen?<br><span style="font-weight:600;opacity:.85">'+formule+'</span></div>';
  return { prompt, lees:true, options:geldOpts(total), correct:formatMoney(total), wide:true };
}

// ===== TELLEN (hoeveelheden) =====
function drawCountItems(g,w,h,n){
  const cols=5, r=12, cw=r*2+8, ch=r*2+8, rows=Math.ceil(n/cols);
  const gridW=Math.min(n,cols)*cw, x0=(w-gridW)/2+r, y0=(h-rows*ch)/2+r;
  g.fillStyle='#1E1B5E';
  for(let i=0;i<n;i++){ const c=i%cols, rr=Math.floor(i/cols); star4(g,x0+c*cw,y0+rr*ch,r); }
}
function genTellen(){
  const max = semester===1 ? 10 : 20;
  const n=ri(1,max), opts=new Set([String(n)]); let t=0;
  while(opts.size<3 && t<40){ t++; const d=n+ri(-3,3); if(d>=1&&d!==n) opts.add(String(d)); }
  while(opts.size<3) opts.add(String(n+opts.size+1));
  return { prompt:'Hoeveel sterren zie je?', draw:(g,w,h)=>drawCountItems(g,w,h,n), options:[...opts].sort(()=>Math.random()-0.5), correct:String(n), wide:false };
}

function genLezen(){ const tier=leesTier();
  const allowed=[tier];
  if(tier<5 && Math.random()<0.25) allowed.push(tier+1); // soms één niveau moeilijker (bv. LJ2·S1-verhaaltje bij LJ1·S2)
  let pool=LEES_Q.filter(x=>allowed.includes(x.lv)); if(pool.length<2) pool=LEES_Q.filter(x=>x.lv<=tier);
  const it=pickFresh(pool.length?pool:LEES_Q, leesRecent, Math.min((pool.length||3)-1,6));
  return { prompt:'<div class="lees-text">'+it.t+'</div><div class="lees-q">'+it.q+'</div>', seq:true, lees:true, options:[...it.a].sort(()=>Math.random()-0.5), correct:it.c, wide:true }; }

// ===== RUIMTELIJK INZICHT (meetkunde: positie, richting, rooster, blokken) =====
function ruimtelijkTier(){ if(level<=1) return semester===1?1:2; if(level===2) return semester===1?3:4; return 4; }
const POS_LABEL={op:'Op de doos',onder:'Onder de doos',naast:'Naast de doos',links:'Links van de doos',rechts:'Rechts van de doos'};
function drawPositie(g,w,h,pos){
  const cx=w/2, cy=h/2, bw=56, bh=44, r=15; g.lineJoin='round';
  g.fillStyle='#C58BE8'; g.strokeStyle=C_NAVY; g.lineWidth=4; roundRect(g,cx-bw/2,cy-bh/2,bw,bh,8); g.fill(); g.stroke();
  g.lineWidth=2.5; g.beginPath(); g.moveTo(cx-bw/2,cy-bh/2+10); g.lineTo(cx+bw/2,cy-bh/2+10); g.stroke();
  let bx=cx,by=cy;
  if(pos==='op') by=cy-bh/2-r-2; else if(pos==='onder') by=cy+bh/2+r+2;
  else if(pos==='links') bx=cx-bw/2-r-10; else { bx=cx+bw/2+r+10; } // rechts/naast
  g.fillStyle='#FFD24A'; g.strokeStyle=C_NAVY; g.lineWidth=3.5; g.beginPath(); g.arc(bx,by,r,0,6.2832); g.fill(); g.stroke();
}
function genPositie(tier){
  const cands = tier<=1 ? ['op','onder','naast'] : ['op','onder','links','rechts'];
  const pos=pick(cands); const opts=new Set([pos]); while(opts.size<3) opts.add(pick(cands));
  return { prompt:'Waar staat de bal?', draw:(g,w,h)=>drawPositie(g,w,h,pos),
    options:[...opts].map(p=>POS_LABEL[p]).sort(()=>Math.random()-0.5), correct:POS_LABEL[pos], wide:true };
}
function drawRow(g,w,h,n,idx){ const r=14, gap=12, tot=n*(r*2)+(n-1)*gap, x0=(w-tot)/2+r, y=h/2;
  for(let i=0;i<n;i++){ g.fillStyle = i===idx?'#FFD24A':'#C7CBE0'; star4(g,x0+i*(r*2+gap),y,r); } }
function genVolgorde(tier){
  const n=tier<=2?4:5, idx=ri(0,n-1); const ORD=['eerste','tweede','derde','vierde','vijfde'];
  const correct=idx===n-1?'laatste':ORD[idx];
  const opts=new Set([correct]); const all=ORD.slice(0,n).concat('laatste');
  while(opts.size<3) opts.add(pick(all));
  return { prompt:'De hoeveelste ster is geel?', draw:(g,w,h)=>drawRow(g,w,h,n,idx),
    options:[...opts].sort(()=>Math.random()-0.5), correct, wide:true };
}
function drawGrid(g,w,h,size,sr,sc){
  const cell=Math.min(w,h)/(size+0.5), gw=cell*size, x0=(w-gw)/2, y0=(h-gw)/2;
  g.fillStyle='rgba(255,255,255,.55)'; g.strokeStyle=C_NAVY; g.lineWidth=3; roundRect(g,x0,y0,gw,gw,8); g.fill(); g.stroke();
  g.lineWidth=2; for(let i=1;i<size;i++){ g.beginPath(); g.moveTo(x0+i*cell,y0); g.lineTo(x0+i*cell,y0+gw); g.moveTo(x0,y0+i*cell); g.lineTo(x0+gw,y0+i*cell); g.stroke(); }
  g.fillStyle='#FFD24A'; star4(g, x0+sc*cell+cell/2, y0+sr*cell+cell/2, cell*0.3);
}
function genRooster(tier,both){
  const size=tier<=3?3:4, sr=ri(0,size-1), sc=ri(0,size-1);
  if(both){ const correct='rij '+(sr+1)+', kolom '+(sc+1); const opts=new Set([correct]);
    while(opts.size<3) opts.add('rij '+ri(1,size)+', kolom '+ri(1,size));
    return { prompt:'In welk vakje staat de ster?', draw:(g,w,h)=>drawGrid(g,w,h,size,sr,sc), options:[...opts].sort(()=>Math.random()-0.5), correct, wide:true }; }
  const askRij=Math.random()<0.5, val=(askRij?sr:sc)+1, correct=(askRij?'rij ':'kolom ')+val;
  const opts=new Set([correct]); while(opts.size<3) opts.add((askRij?'rij ':'kolom ')+ri(1,size));
  return { prompt:'In welke '+(askRij?'rij':'kolom')+' staat de ster?', draw:(g,w,h)=>drawGrid(g,w,h,size,sr,sc), options:[...opts].sort(()=>Math.random()-0.5), correct, wide:true };
}
function drawBlocks(g,w,h,heights){ const s=26, gap=4, cols=heights.length, tot=cols*s+(cols-1)*gap;
  const x0=(w-tot)/2, baseY=h/2+(Math.max(...heights)*s)/2;
  heights.forEach((hh,ci)=>{ for(let r=0;r<hh;r++){ const x=x0+ci*(s+gap), y=baseY-(r+1)*s;
    g.fillStyle='#6AD1A8'; g.strokeStyle=C_NAVY; g.lineWidth=2.5; g.lineJoin='round'; roundRect(g,x,y,s,s,5); g.fill(); g.stroke(); } }); }
function genBlokken(){ const cols=ri(2,3), heights=[]; for(let i=0;i<cols;i++) heights.push(ri(1,3));
  if(Math.max(...heights)<2) heights[ri(0,cols-1)]=ri(2,3); // zorg voor minstens één stapeltje
  let n=heights.reduce((a,b)=>a+b,0);
  const opts=new Set([String(n)]); let t=0; while(opts.size<3&&t<30){ t++; const d=n+ri(-2,2); if(d>=1&&d!==n) opts.add(String(d)); }
  while(opts.size<3) opts.add(String(n+opts.size));
  return { prompt:'Hoeveel blokken zie je?', draw:(g,w,h)=>drawBlocks(g,w,h,heights), options:[...opts].sort(()=>Math.random()-0.5), correct:String(n), wide:false };
}
function genRuimtelijk(){
  const tier=ruimtelijkTier();
  const types = tier===1?['pos'] : tier===2?['pos','volgorde'] : tier===3?['volgorde','rooster','pos'] : ['rooster2','blokken','rooster','volgorde'];
  const t=pick(types);
  if(t==='pos') return genPositie(tier);
  if(t==='volgorde') return genVolgorde(tier);
  if(t==='rooster') return genRooster(tier,false);
  if(t==='rooster2') return genRooster(tier,true);
  return genBlokken();
}

function makeQuestion(subject){
  if(subject==='rekenen'){ const d=genMath(); return { prompt:d.q, seq:false, options:numOpts(d.ans), correct:String(d.ans), wide:false }; }
  if(subject==='logica'){ const d=genSeq(); return { prompt:d.q, seq:true, options:numOpts(d.ans), correct:String(d.ans), wide:false }; }
  if(subject==='klok') return genKlok();
  if(subject==='vormen') return genVormen();
  if(subject==='geld') return genGeld();
  if(subject==='tellen') return genTellen();
  if(subject==='ruimte') return genRuimte();
  if(subject==='ruimtelijk') return genRuimtelijk();
  if(subject==='lezen') return genLezen();
  return { prompt:'?', options:['1','2','3'], correct:'1', wide:false };
}
function nextQuestion(){ const st=mgState; if(!st) return; if(st.i>=st.total){ showResult(); return; }
  const q=makeQuestion(st.subject); const s=SUBJECTS[st.subject];
  const showS = true; // alle vakken hebben nu een begin/einde-split
  const head='<div class="mg-top"><span class="pill">'+s.label+' · LJ'+level+(showS?' · S'+semester:'')+'</span><span class="pill">Vraag '+(st.i+1)+' / '+st.total+'</span></div>';
  let qhtml;
  if(q.draw){ qhtml='<div class="q-prompt">'+q.prompt+'</div><div class="qbox draw"><canvas id="qcanvas" width="220" height="150"></canvas></div>'; }
  else { qhtml='<div class="qbox'+(q.lees?' lees':(q.seq?' seq':''))+'">'+q.prompt+'</div>'; }
  const ansHtml='<div class="answers'+(q.wide?' wide':'')+'">'+q.options.map(o=>'<button class="ans'+(q.wide?' wide':'')+'" data-v="'+String(o).replace(/"/g,'&quot;')+'">'+o+'</button>').join('')+'</div>';
  mgcard.innerHTML=head+qhtml+ansHtml;
  if(q.draw){ const c=document.getElementById('qcanvas'); if(c){ const g=c.getContext('2d'); g.clearRect(0,0,c.width,c.height); q.draw(g,c.width,c.height); } }
  mgcard.querySelectorAll('.ans').forEach(btn=>{ btn.onclick=()=>answer(btn, btn.dataset.v, String(q.correct)); });
}
function answer(btn,val,correct){
  const btns=mgcard.querySelectorAll('.ans'); btns.forEach(b=>b.disabled=true);
  if(val===correct){ btn.classList.add('good'); mgState.earned+=1; addStars(1); }
  else { btn.classList.add('bad'); btns.forEach(b=>{ if(b.dataset.v===correct)b.classList.add('good'); }); }
  mgState.i++; setTimeout(nextQuestion, val===correct?550:1050);
}
function showResult(){
  const e=mgState.earned, total=mgState.total, base=mgState.base||0;
  const newScore=Math.min(10, base+e);        // opgebouwde score
  const perfect=newScore>=10;
  if(mgState.beam){ mgState.beam.played=true; mgState.beam.score=newScore;
    if(allPlayed(cur) && !cur.blackhole.unlocked){ cur.blackhole.unlocked=true; toast('Knap! Je speelde alle vakken — het zwarte gat is open. Vlieg erin naar een nieuwe ruimte!'); }
    updateVakkenHud(); updateGoalHud(); }
  scheduleSave();
  const remaining=10-newScore;
  const msg=e>=Math.max(1,Math.round(total*0.8))?'Geweldig gedaan!':e>=Math.ceil(total/2)?'Goed bezig!':'Blijf oefenen!';
  const disp=e<=0?'☆':'★'.repeat(Math.min(e,10));
  const extra = perfect
    ? '<div class="mg-sub">Alles juist! Dit vak is <b>voltooid</b> 🏆</div>'
    : '<div class="mg-sub">Je hebt nu <b>'+newScore+'/10</b> juist. Nog <b>'+remaining+'</b> te verbeteren — vlieg opnieuw door de beam!</div>';
  mgcard.innerHTML='<div class="stars-earned">'+disp+'</div><div class="mg-msg">'+msg+'</div>'+
    '<div class="mg-sub">Je verdiende <b>'+e+' '+(e===1?'ster':'sterren')+'</b> ('+e+' van '+total+' goed).</div>'+
    extra+
    '<button class="btn" id="mgdone">Verder vliegen</button>';
  document.getElementById('mgdone').onclick=closeMiniGame;
}
function showComingSoon(){

    '<div class="qbox seq" style="font-size:22px">Lezen komt binnenkort!</div>'+

function showStart(returning){
  paused=true;
  const grid=GRADES.map((g,i)=>{ const lv=i+1;
    return '<button class="grade'+(lv===level?' sel':'')+'" data-l="'+lv+'" style="background:'+g.c+'">'+
      '<div class="num">'+g.n+'</div><div class="lbl">leerjaar</div></button>';
  }).join('');
  const head = (returning && hasName())
    ? '<div class="mg-msg ob-hi">Welkom terug! 🛸</div>'+
      '<div class="ob-sentence">Je hebt al <b>'+points+' ★</b>! Mijn naam is…</div>'
    : '<div class="mg-msg ob-hi">Hoi ruimtevaarder! 🛸</div><div class="ob-sentence">Mijn naam is…</div>';
  const nameField =
    '<input class="ob-input" id="obname" maxlength="14" placeholder="tik je naam" autocomplete="off" value="'+(hasName()?playerName:'')+'">';
  const semrow =
    '<div class="ob-sentence" style="margin-top:12px">Wanneer in het schooljaar?</div>'+
    '<div class="semrow">'+
      '<button class="lvlbtn sembtn'+(semester===1?' sel':'')+'" data-s="1">Begin van \'t jaar</button>'+
      '<button class="lvlbtn sembtn'+(semester===2?' sel':'')+'" data-s="2">Einde van \'t jaar</button>'+
    '</div>';
  startcard.innerHTML = head + nameField +
    '<div class="ob-sentence" style="margin-top:14px">…en ik zit in het</div>'+
    '<div class="grade-grid">'+grid+'</div>'+
    semrow+
    '<button class="btn" id="startbtn" style="margin-top:16px;font-size:19px">Vliegen maar! 🚀</button>'+
    (returning ? '<br><button class="btn ghost" id="obreset" style="margin-top:10px">Voortgang wissen</button>' : '');
  startcard.querySelectorAll('.grade').forEach(b=>b.onclick=()=>{ level=parseInt(b.dataset.l);
    startcard.querySelectorAll('.grade').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); });
  startcard.querySelectorAll('.sembtn').forEach(b=>b.onclick=()=>{ semester=parseInt(b.dataset.s);
    startcard.querySelectorAll('.sembtn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); });
  startEl.classList.add('show');
  const rb=document.getElementById('obreset'); if(rb) rb.onclick=()=>{ if(confirm('Voortgang wissen en opnieuw beginnen?')){ wiping=true; localStorage.removeItem(SAVE_KEY); location.reload(); } };
  const inp=document.getElementById('obname'); if(inp) setTimeout(()=>{ try{ inp.focus(); }catch(e){} },120);
  document.getElementById('startbtn').onclick=()=>{
    const f=document.getElementById('obname');
    if(f){ const v=f.value.trim(); playerName = v || 'Ruimtevaarder'; document.getElementById('namelabel').textContent=playerName; }
    startEl.classList.remove('show'); paused=false; last=performance.now(); scheduleSave();
  };
}

// ---- boot ----
const saved=loadRaw();
const returning=applySave(saved);
document.getElementById('namelabel').textContent=playerName;
document.getElementById('ptsval').textContent=points;
if(returning){ // herstel positie nabij blackhole/centrum van huidig stelsel
  ufo.x=Math.min(cur.w-120,640); ufo.y=Math.min(cur.h-120,640);
  cam.x=ufo.x-W/2; cam.y=ufo.y-H/2;
}
checkUpgrades(true); // pas eerder verdiende upgrades stil toe + vul het aftel-chipje
upgradeBadge=false; updateUfoBtn();
arcadeAvail = arcadeMilestones()>arcadeConsumed; arcadeAnnouncePending=false; updateArcadeChip();
updateVakkenHud();
updateGoalHud();
showStart(returning);

// service worker (PWA / offline)
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
// laatste kans om op te slaan
window.addEventListener('pagehide',saveState); window.addEventListener('visibilitychange',()=>{ if(document.hidden) saveState(); });

function loop(now){ let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  if(mode==='arcade'){ updateArcade(dt); renderArcade(); } else { update(dt); render(); }
  requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
</html>
